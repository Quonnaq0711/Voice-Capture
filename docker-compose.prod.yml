version: "3.9"

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: product-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - db
    command: >
      python -m uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
  personal_assistant:
    build:
      context: ./backend/personal_assistant
      dockerfile: Dockerfile.prod
      container_name: product_pa
      restart: unless-stopped
      ports:
        - "8001:8001"
      env_file:
        - .env
      depends_on:
        - db
        - ollama
      volumes:
        - ./backend/personal_assistant:/app
      command: >
        python -m uvicorn main:app
        --host 0.0.0.0
        --port 8001
        --reload  

  frontend:
    build: ./frontend
    dockerfile: Dockerfile.prod
    container_name: product-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./frontend:/app
    command: npm start

  db:
    image: postgres:15
    container_name: product-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-productdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: product-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      OLLAMA_ORIGINS: ${OLLAMA_ORIGINS:*}
      OLLAMA_HOST: ${OLLAMA_HOST:0.0.0.0:11434}
    volumes:
      - ./data/ollama:/root/.ollama
    command: > 
      python -m uvicorn main:app
      --host 0.0.0.0
      --port 8001
      --reload

  nginx:
    image: nginx:alpine
    container_name: product-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - frontend
      - backend
      - personal_assistant

volumes:
  postgres_data: