# version: "3.9"

services:
  backend-staging:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    container_name: idii-backend-staging
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.staging
    environment:
      DB_TYPE: postgresql
      DB_HOST: db-staging
      DB_PORT: 5432
      DB_NAME: idii-staging
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    depends_on:
      - db-staging
    networks:
      - staging-network
    labels:
      - "environment=staging"
    volumes:
      # Persist user uploads (resumes and avatars) - multi-user with user_id subdirectories
      - /home/idii/data/user-uploads/resumes:/app/resumes
      - /home/idii/data/user-uploads/avatars:/app/avatars
      # SQLite backup kept for migration reference
      - /home/idii/data/database:/app/db-backup:ro
    # Use default CMD from Dockerfile (backend.main:app with PYTHONPATH)
      
  
  personal-assistant-staging:
    build:
      context: .  # Change from ./backend/personal_assistant to project root
      dockerfile: backend/personal_assistant/Dockerfile.prod
    container_name: idii-PA-staging
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env.staging
    environment:
      DB_TYPE: postgresql
      DB_HOST: db-staging
      DB_PORT: 5432
      DB_NAME: idii-staging
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    depends_on:
      - db-staging
      - ollama-staging
    networks:
      - staging-network
    volumes:
      # SQLite backup kept for migration reference
      - /home/idii/data/database:/app/db-backup:ro
    command: >
        python -m uvicorn main:app
        --host 0.0.0.0
        --port 8001          

  frontend-staging:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        REACT_APP_BACKEND_URL: https://staging.idii.co/api
        REACT_APP_PA_URL: https://staging.idii.co/pa-api 
        REACT_ENVIRONMENT: staging 
    container_name: idii-frontend-staging
    # ports:
      # - "3000:80"
    restart: unless-stopped
    networks:
      - staging-network
    # volumes:
    #   - ./frontend:/app
    # command: npm start

  db-staging:
    image: postgres:15
    container_name: idii-db-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-idii-staging}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      # Data persistence - survives container updates
      - /home/idii/data/postgres-staging:/var/lib/postgresql/data
    networks:
      - staging-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-staging:
    image: ollama/ollama:latest
    container_name: idii-ollama-staging
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      OLLAMA_ORIGINS: "${OLLAMA_ORIGINS:-*}"
      OLLAMA_HOST: "${OLLAMA_HOST:-0.0.0.0:11434}"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    volumes:
      - ./data/ollama-staging:/root/.ollama
    networks:
      staging-network:
        aliases:
          - ollama-staging
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia

  ollama2-staging:
    image: ollama/ollama:latest
    container_name: idii-ollama2-staging
    restart: unless-stopped
    ports:
      - "11435:11434"
    environment:
      OLLAMA_ORIGINS: "${OLLAMA_ORIGINS:-*}"
      OLLAMA_HOST: "0.0.0.0:11434"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    volumes:
      - ./data/ollama2-staging:/root/.ollama
    networks:
      staging-network:
        aliases:
          - ollama2-staging
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia

  career-agent-staging:
    build:
      context: .
      dockerfile: modules/agents/career/Dockerfile.prod
    container_name: idii-career-agent-staging
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - .env.staging
    environment:
      CAREER_OLLAMA_URL: "http://ollama2-staging:11434"
      DB_TYPE: postgresql
      DB_HOST: db-staging
      DB_PORT: 5432
      DB_NAME: idii-staging
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    depends_on:
      - db-staging
      - ollama2-staging
    networks:
      - staging-network
    volumes:
      # Share resumes with backend
      - /home/idii/data/user-uploads/resumes:/app/resumes
      # SQLite backup kept for migration reference
      - /home/idii/data/database:/app/db-backup:ro
    command: >
      python -m uvicorn main:app
      --host 0.0.0.0
      --port 8002

  nginx-staging:
    build: 
      context: .
      dockerfile: nginx.Dockerfile
    container_name: idii-nginx-staging
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - staging-network
    depends_on:
      - frontend-staging
      - backend-staging
      - personal-assistant-staging

volumes:
  postgres_data:

networks:
  staging-network:
    driver: bridge
    name: idii-staging
