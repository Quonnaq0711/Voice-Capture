# version: "3.9"

services:
  backend-staging:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    container_name: idii-backend-staging
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.staging
    environment:
      DB_TYPE: postgresql
      DB_HOST: db-staging
      DB_PORT: 5432
      DB_NAME: idii-staging
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    depends_on:
      - db-staging
    networks:
      - staging-network
    labels:
      - "environment=staging"
    volumes:
      # Persist user uploads (resumes and avatars) - multi-user with user_id subdirectories
      - /home/idii/data/user-uploads/resumes:/app/resumes
      - /home/idii/data/user-uploads/avatars:/app/avatars
      # SQLite backup kept for migration reference
      - /home/idii/data/database:/app/db-backup:ro
    # Use default CMD from Dockerfile (backend.main:app with PYTHONPATH)
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
      
  
  personal-assistant-staging:
    build:
      context: .  # Change from ./backend/personal_assistant to project root
      dockerfile: backend/personal_assistant/Dockerfile.prod
    container_name: idii-PA-staging
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env.staging
    environment:
      DB_TYPE: postgresql
      DB_HOST: db-staging
      DB_PORT: 5432
      DB_NAME: idii-staging
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    depends_on:
      - db-staging
      - vllm-server
    networks:
      - staging-network
    volumes:
      # SQLite backup kept for migration reference
      - /home/idii/data/database:/app/db-backup:ro
    # Use default CMD from Dockerfile (gunicorn with 4 workers)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
        reservations:
          memory: 1G

  frontend-staging:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        REACT_APP_BACKEND_URL: https://staging.idii.co/api
        REACT_APP_PA_URL: https://staging.idii.co/pa-api
        REACT_ENVIRONMENT: staging
    container_name: idii-frontend-staging
    # ports:
      # - "3000:80"
    restart: unless-stopped
    networks:
      - staging-network
    # volumes:
    #   - ./frontend:/app
    # command: npm start
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M

  db-staging:
    image: postgres:15
    container_name: idii-db-staging
    restart: unless-stopped

    # Performance optimization for 500-1000 concurrent users (4-core CPU)
    # These parameters are applied at PostgreSQL startup
    command:
      - "postgres"
      - "-c"
      - "max_connections=500"              # Increased from default 100 to support more connections
      - "-c"
      - "shared_buffers=2GB"               # 25% of 8GB RAM (optimal for dedicated DB)
      - "-c"
      - "work_mem=8MB"                     # Per-operation memory for sorting/hashing
      - "-c"
      - "maintenance_work_mem=256MB"       # Memory for VACUUM, CREATE INDEX operations
      - "-c"
      - "effective_cache_size=4GB"         # Hint to query planner (50-75% of RAM)
      - "-c"
      - "wal_buffers=16MB"                 # WAL write buffer optimization
      - "-c"
      - "checkpoint_completion_target=0.9" # Spread checkpoint I/O
      - "-c"
      - "random_page_cost=1.1"             # SSD optimization (default 4.0 for HDD)
      - "-c"
      - "max_prepared_transactions=100"    # For connection pooling

    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-idii-staging}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    # Port removed for security - access via Docker network only (db-staging)
    # ports:
    #   - "5432:5432"
    volumes:
      # Data persistence - survives container updates
      - /home/idii/data/postgres-staging:/var/lib/postgresql/data
    networks:
      - staging-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # vLLM Server (High-Performance LLM Inference)
  # ============================================
  # Replaces Ollama for production workloads
  # Benefits: 2-5x faster inference, better GPU utilization
  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: idii-vllm-staging
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      HF_TOKEN: "${HF_TOKEN}"
      HUGGING_FACE_HUB_TOKEN: "${HF_TOKEN}"
    command:
      - "--model"
      - "${VLLM_MODEL:-google/gemma-3-4b-it}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8888"
      - "--gpu-memory-utilization"
      - "${VLLM_GPU_MEMORY_UTILIZATION:-0.85}"
      - "--max-model-len"
      - "${VLLM_MAX_MODEL_LEN:-8192}"
      - "--dtype"
      - "${VLLM_DTYPE:-bfloat16}"
      - "--trust-remote-code"
      # ===== Concurrency Optimization =====
      # Allow multiple concurrent sequences (PA chat + Career analysis)
      - "--max-num-seqs"
      - "8"
      # Enable chunked prefill for better handling of mixed long/short requests
      - "--enable-chunked-prefill"
      # Limit batch tokens to prevent long requests from blocking short ones
      - "--max-num-batched-tokens"
      - "4096"
      # Enable prefix caching for repeated system prompts
      - "--enable-prefix-caching"
    volumes:
      - /home/idii/data/vllm-cache:/root/.cache/huggingface
    networks:
      staging-network:
        aliases:
          - vllm-server
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 12G
    runtime: nvidia
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  # ============================================
  # Ollama Services (Legacy - kept for fallback)
  # ============================================
  # Note: When LLM_PROVIDER=vllm, these are not started
  # To use Ollama, set LLM_PROVIDER=ollama in .env.staging
  ollama-staging:
    image: ollama/ollama:latest
    container_name: idii-ollama-staging
    restart: unless-stopped
    profiles:
      - ollama  # Only starts with --profile ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_ORIGINS: "${OLLAMA_ORIGINS:-*}"
      OLLAMA_HOST: "${OLLAMA_HOST:-0.0.0.0:11434}"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    volumes:
      - /home/idii/data/ollama-staging:/root/.ollama
    networks:
      staging-network:
        aliases:
          - ollama-staging
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia

  ollama2-staging:
    image: ollama/ollama:latest
    container_name: idii-ollama2-staging
    restart: unless-stopped
    profiles:
      - ollama  # Only starts with --profile ollama
    ports:
      - "11435:11434"
    environment:
      OLLAMA_ORIGINS: "${OLLAMA_ORIGINS:-*}"
      OLLAMA_HOST: "0.0.0.0:11434"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    volumes:
      - /home/idii/data/ollama2-staging:/root/.ollama
    networks:
      staging-network:
        aliases:
          - ollama2-staging
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia

  career-agent-staging:
    build:
      context: .
      dockerfile: modules/agents/career/Dockerfile.prod
    container_name: idii-career-agent-staging
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - .env.staging
    environment:
      # vLLM API endpoint (OpenAI-compatible)
      VLLM_API_BASE: "http://vllm-server:8888/v1"
      DB_TYPE: postgresql
      DB_HOST: db-staging
      DB_PORT: 5432
      DB_NAME: idii-staging
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    depends_on:
      - db-staging
      - vllm-server
    networks:
      - staging-network
    volumes:
      # Share resumes with backend
      - /home/idii/data/user-uploads/resumes:/app/resumes
      # SQLite backup kept for migration reference
      - /home/idii/data/database:/app/db-backup:ro
    # Use default CMD from Dockerfile (gunicorn with 4 workers)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
        reservations:
          memory: 1G
  redis:
    build:
      context: .
      dockerfile: backend/Rag/Dockerfile.prod
    container_name: idii-Rag-staging
    restart: unless-stopped
    ports: ["6370:6379"]
    image: redis:7-alpine
    volumes: ["redis_data:/data"]
    command: redis-server --appendonly yes


  nginx-staging:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    container_name: idii-nginx-staging
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - staging-network
    depends_on:
      - frontend-staging
      - backend-staging
      - personal-assistant-staging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M

volumes:
  postgres_data:
  redis_data:

networks:
  staging-network:
    driver: bridge
    name: idii-staging
