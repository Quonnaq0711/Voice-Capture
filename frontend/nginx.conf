events {
    worker_connections 1024;
}

http {
    upstream backend {
        server idii-backend-staging:8000;
    }

    upstream personal_assistant {
        server idii-PA-staging:8001;
    }

    upstream career_agent {
        server idii-career-agent-staging:8002;
    }

    upstream work_agent {
        server idii-work-agent-staging:8003;
    }

    upstream voice_service {
        server idii-voice-staging:8004;
    }

    upstream frontend {
        server idii-frontend-staging:80;
    }

    # Optimized rate limiting for 500-1000 concurrent users
    # API zone: Increased from 10r/s to 50r/s for better chat experience
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    # General zone: Increased from 100r/s to 200r/s for static assets
    limit_req_zone $binary_remote_addr zone=general:10m rate=200r/s;

    server {
        listen 80;
        server_name staging.idii.co www.staging.idii.co;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name staging.idii.co www.staging.idii.co;

        ssl_certificate /etc/nginx/ssl/origin.crt;
        ssl_certificate_key /etc/nginx/ssl/origin.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Content Security Policy - controls resource loading sources
        # Allows: tally.so (feedback widget), cloudflareinsights.com (analytics)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://tally.so https://*.tally.so https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://staging.idii.co wss://staging.idii.co https://tally.so https://*.tally.so https://static.cloudflareinsights.com; frame-src 'self' https://tally.so https://*.tally.so; frame-ancestors 'self';" always;

        # Personal Assistant API (port 8001)
        # IMPORTANT: Must be defined before /api/ to match correctly
        location /api/pa/ {
            # Increased burst from 10 to 30 for handling request spikes
            limit_req zone=api burst=30 nodelay;
            rewrite ^/api/pa/(.*)$ /api/chat/$1 break;
            proxy_pass http://personal_assistant;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Support for SSE streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
        }

        # Career Agent API (port 8002)
        # IMPORTANT: Must be defined before /api/ to match correctly
        location /api/career/ {
            # Increased burst from 10 to 30 for handling request spikes
            limit_req zone=api burst=30 nodelay;

            # Rewrite /api/career/* to the appropriate backend path
            # For chat endpoints: /api/career/message -> /api/chat/message
            # For insights endpoints: /api/career/insights -> /api/chat/insights
            # For other endpoints: /api/career/analyze_resume_streaming -> /api/career/analyze_resume_streaming
            rewrite ^/api/career/(message|health|models|history|insights)(.*)$ /api/chat/$1$2 break;
            rewrite ^/api/career/(.*)$ /api/career/$1 break;

            proxy_pass http://career_agent;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE/Streaming support - CRITICAL for resume analysis
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;

            # Pass through X-Accel-Buffering header from backend to disable buffering
            proxy_pass_header X-Accel-Buffering;

            # Increased timeouts for streaming resume analysis
            # Normal case (GPU): ~2 minutes total, ~15s per section
            # Allow 5 minutes buffer for model loading, high concurrency, or temporary GPU issues
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;

            # Keepalive for long-running SSE connections
            keepalive_timeout 300s;
        }

        # Work Agent API (port 8003)
        # Handles: todos, calendar, gmail, meeting prep
        # IMPORTANT: Must be defined before /api/ to match correctly
        location /api/work/ {
            limit_req zone=api burst=30 nodelay;

            proxy_pass http://work_agent;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE/Streaming support for chat and AI features
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;

            # Pass through X-Accel-Buffering header from backend
            proxy_pass_header X-Accel-Buffering;

            # Timeout for AI-powered meeting prep
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            keepalive_timeout 300s;
        }

        # Voice STT Service (port 8004)
        # IMPORTANT: Must be defined before /api/ to match correctly
        location /api/voice/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://voice_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Audio upload: allow up to 10MB
            client_max_body_size 10m;

            # Transcription can take a few seconds
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
        }

        # Backend API (catch-all for /api/*)
        location /api/ {
            # Increased burst from 10 to 30 for handling request spikes
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Resume files (static files from backend)
        location /resumes/ {
            proxy_pass http://backend/resumes/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Avatar files (static files from backend)
        location /avatars/ {
            proxy_pass http://backend/avatars/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend (catch-all, must be last)
        location / {
            # Increased burst from 20 to 50 for better page load performance
            limit_req zone=general burst=50 nodelay;
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
