events {
    worker_connections 1024;
}

http {
    upstream backend {
        server idii-backend-staging:8000;
    }
    
    upstream personal_assistant {
        server idii-PA-staging:8001;
    }
    
    upstream frontend {
        server idii-frontend-staging:80;
    }

    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;

    server {
        listen 80;
        server_name staging.idii.co www.staging.idii.co;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name staging.idii.co www.staging.idii.co;

        ssl_certificate /etc/nginx/ssl/origin.crt;
        ssl_certificate_key /etc/nginx/ssl/origin.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Frontend
        location / {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Personal Assistant API
        location /pa-api/ {
            limit_req zone=api burst=10 nodelay;
            rewrite ^/pa-api/(.*)$ /$1 break;
            proxy_pass http://personal_assistant;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
